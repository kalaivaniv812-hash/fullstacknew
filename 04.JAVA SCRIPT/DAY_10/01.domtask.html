<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task 01</title>
</head>
<body>
    
    <div>
        <input type="text" id="nameInput" placeholder="enter you name">
        <p id="previewText" ></p>
    </div>





    <script>
        let input =document.getElementById("nameInput");
        let preivew = document.getElementById("previewText");

       input.addEventListener("input" ,() => {
        preivew.textContent = input.value;
       })
        
        
    </script>
</body>
</html>
