<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grid Gallery</title>

<style>

.container{
    width: 80%;
    margin: auto;

    display: grid;
    grid-template-columns: repeat(3, 1fr); 
    gap: 20px;
}

.container img{
    width: 100%;
    height: auto;
    border-radius: 8px;
}

</style>
</head>

<body>

<h2 style="text-align:center;">Image Gallery</h2>

<div class="container">

<img src="https://picsum.photos/300/200?1">
<img src="https://picsum.photos/300/200?2">
<img src="https://picsum.photos/300/200?3">
<img src="https://picsum.photos/300/200?4">
<img src="https://picsum.photos/300/200?5">
<img src="https://picsum.photos/300/200?6">

</div>

</body>
</html>
