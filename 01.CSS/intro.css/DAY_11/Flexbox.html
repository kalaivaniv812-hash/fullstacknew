<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
</head>
<body>
    


<style>

.container{
    width: 80%;
    margin: auto;
    display: flex;
    justify-content: space-evenly;
}

.card{
    width: 200px;
    border: 1px solid #ccc;
    padding: 15px;
    text-align: center;
    border-radius: 10px;
}

.card img{
    width: 100%;
    height: 150px;
}

button{
    background-color: green;
    color: white;
    border: none;
    padding: 8px 15px;
    cursor: pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="card">
<img src="Image/01.png" alt="product">
<h3>School Bag</h3>
<p>Strong and stylish bag for kids.</p>
<h4>750</h4>
<button>Buy</button>
</div>

<div class="card">
<img src="Image/00.webp" alt="product">
<h3>Water Bottle</h3>
<p>Safe plastic bottle for school use.</p>
<h4>250</h4>
<button>Buy</button>
</div>

<div class="card">
<img src="Image/02.webp" alt="product">
<h3>Pencil Box</h3>
<p>Spacious pencil box for students.</p>
<h4>150</h4>
<button>Buy</button>
</div>

</div>

</body>
</html>
