<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Card Box</title>
    <style>
       
        body {
            margin: 0;
            min-height: 100vh;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        
        .card {
            width: 200px;
            height: 200px;
            background: white;
            border-radius: 12px;
            
         
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            
           
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            
            
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
      
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.2);
        }
        
       
        .card h3 {
            margin: 0 0 8px 0;
            color: #333;
        }
        
        .card p {
            margin: 0;
            color: #666;
            font-size: 14px;
        }
        
        .emoji {
            font-size: 48px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji">📦</div>
        <h3>Card Box</h3>
        <p>Hover me ↑</p>
    </div>
</body>
</html>
